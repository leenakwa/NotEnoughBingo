      - in: query
        name: author
        schema:
          type: string
        description: Case-insensitive author username or display-name filter.
      - in: query
        name: mine
        schema:
          type: boolean
        description: For an authenticated viewer, return their own live bingos.
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - newest
          - popular
          default: newest
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Case-insensitive title, username, or display-name search.
      - in: query
        name: tags
        schema:
          type: array
          items:
            type: string
        description: Repeat for every tag name or slug that must match.
        explode: true
        style: form
      tags:
      - bingos
      security:
