name: ${COMPOSE_PROJECT_NAME:-not-enough-bingo}

x-backend-environment: &backend-environment
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
  DEBUG: ${DEBUG:-true}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-local-only-change-before-any-shared-environment}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,proxy}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
  CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-false}
  SESSION_COOKIE_AGE: ${SESSION_COOKIE_AGE:-1209600}
  SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
  TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-1}
  DATABASE_URL: ${DATABASE_URL:-postgresql://not_enough_bingo:local-postgres-change-me@postgres:5432/not_enough_bingo}
  DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CACHE_BACKEND: ${CACHE_BACKEND:-django.core.cache.backends.redis.RedisCache}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
  CELERY_TASK_TIME_LIMIT_SECONDS: ${CELERY_TASK_TIME_LIMIT_SECONDS:-900}
  CELERY_TASK_SOFT_TIME_LIMIT_SECONDS: ${CELERY_TASK_SOFT_TIME_LIMIT_SECONDS:-840}
  USE_S3: ${USE_S3:-true}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-neb-service}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-neb-service-local-change-me}
  S3_BUCKET: ${S3_BUCKET:-not-enough-bingo-local}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
  S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  MEDIA_UPLOAD_URL_TTL_SECONDS: ${MEDIA_UPLOAD_URL_TTL_SECONDS:-900}
  MEDIA_ORPHAN_RETENTION_HOURS: ${MEDIA_ORPHAN_RETENTION_HOURS:-24}
  MEDIA_AVATAR_MAX_BYTES: ${MEDIA_AVATAR_MAX_BYTES:-5242880}
  MEDIA_COVER_MAX_BYTES: ${MEDIA_COVER_MAX_BYTES:-8388608}
  MEDIA_BACKGROUND_MAX_BYTES: ${MEDIA_BACKGROUND_MAX_BYTES:-12582912}
  MEDIA_CELL_IMAGE_MAX_BYTES: ${MEDIA_CELL_IMAGE_MAX_BYTES:-5242880}
  MEDIA_MAX_ACTIVE_UPLOAD_INTENTS: ${MEDIA_MAX_ACTIVE_UPLOAD_INTENTS:-100}
  MEDIA_ALLOWED_MIME_TYPES: ${MEDIA_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp,image/avif}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-15728640}
  MAX_CELL_IMAGES_PER_BINGO: ${MAX_CELL_IMAGES_PER_BINGO:-100}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-mailpit}
  EMAIL_PORT: ${EMAIL_PORT:-1025}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Not Enough Bingo <no-reply@localhost>}
  EMAIL_VERIFICATION_TTL_SECONDS: ${EMAIL_VERIFICATION_TTL_SECONDS:-86400}
  EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS: ${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:-60}
  EMAIL_VERIFICATION_MAX_PER_DAY: ${EMAIL_VERIFICATION_MAX_PER_DAY:-10}
  PASSWORD_RESET_TTL_SECONDS: ${PASSWORD_RESET_TTL_SECONDS:-3600}
  AUTH_LOGIN_RATE_LIMIT: ${AUTH_LOGIN_RATE_LIMIT:-5/m}
  AUTH_REGISTER_RATE_LIMIT: ${AUTH_REGISTER_RATE_LIMIT:-5/h}
  AUTH_PASSWORD_RESET_RATE_LIMIT: ${AUTH_PASSWORD_RESET_RATE_LIMIT:-3/h}
  AUTH_EMAIL_VERIFICATION_RATE_LIMIT: ${AUTH_EMAIL_VERIFICATION_RATE_LIMIT:-5/h}
  COMMENT_RATE_LIMIT: ${COMMENT_RATE_LIMIT:-10/m}
  REPORT_RATE_LIMIT: ${REPORT_RATE_LIMIT:-5/h}
  UPLOAD_RATE_LIMIT: ${UPLOAD_RATE_LIMIT:-30/h}
  ACCOUNT_DELETION_GRACE_DAYS: ${ACCOUNT_DELETION_GRACE_DAYS:-14}
  ACCOUNT_EXPORT_RETENTION_HOURS: ${ACCOUNT_EXPORT_RETENTION_HOURS:-24}
  DEV_SEED_PASSWORD: ${DEV_SEED_PASSWORD:-LocalDevPassword!123}

x-backend-service: &backend-service
  build:
    context: ./backend
    dockerfile: Dockerfile
    target: development
  init: true
  restart: unless-stopped
  environment: *backend-environment
  volumes:
    - ./backend:/app
  networks:
    - app

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    init: true
    restart: unless-stopped
    command:
      - npm
      - run
      - dev
      - --
      - --hostname
      - 0.0.0.0
      - --port
      - "3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:8080}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      NEXT_PUBLIC_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_CSRF_COOKIE_NAME:-neb_csrf}
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000/api/v1}
    volumes:
      - ./frontend:/app
      - ./backend/openapi.yaml:/backend/openapi.yaml:ro
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          require('http').get('http://127.0.0.1:3000/api/health',
          response => process.exit(response.statusCode === 200 ? 0 : 1))
          .on('error', () => process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 15s
    networks:
      - app

  backend:
    <<: *backend-service
    command:
      - python
      - manage.py
      - runserver
      - 0.0.0.0:8000
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import sys, urllib.request;
          response = urllib.request.urlopen(
              'http://127.0.0.1:8000/api/v1/health/ready/', timeout=3
          );
          sys.exit(0 if response.status == 200 else 1)
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s

  worker:
    <<: *backend-service
    command:
      - celery
      - -A
      - config
      - worker
      - --loglevel=${LOG_LEVEL:-INFO}
      - --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
      - --hostname=worker@%h
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          celery -A config inspect ping
          --destination "worker@$$HOSTNAME" --timeout 5 | grep -q pong
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    stop_grace_period: 60s

  beat:
    <<: *backend-service
    command:
      - celery
      - -A
      - config
      - beat
      - --loglevel=${LOG_LEVEL:-INFO}
      - --pidfile=/tmp/celerybeat.pid
      - --schedule=/tmp/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          test -s /tmp/celerybeat.pid &&
          kill -0 "$$(cat /tmp/celerybeat.pid)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-not_enough_bingo}
      POSTGRES_USER: ${POSTGRES_USER:-not_enough_bingo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-postgres-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 60s
    networks:
      - app

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
    volumes:
      - redis_data:/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    stop_grace_period: 30s
    networks:
      - app

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2025-09-07T16-13-09Z}
    restart: unless-stopped
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-change-me}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:8080}
    volumes:
      - minio_data:/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - http://127.0.0.1:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 30s
    networks:
      - app

  minio-init:
    image: minio/mc:${MINIO_MC_IMAGE_TAG:-RELEASE.2025-08-13T08-35-41Z}
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ceu
      - --
    command:
      - >-
        mc alias set local http://minio:9000
        "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
        mc mb --ignore-existing "local/$$S3_BUCKET";
        mc anonymous set none "local/$$S3_BUCKET";
        mc version enable "local/$$S3_BUCKET";
        sed "s|__S3_BUCKET__|$$S3_BUCKET|g"
        /config/media-service-policy.json > /tmp/media-service-policy.json;
        mc admin user add local "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY";
        mc admin policy create local neb-media-service
        /tmp/media-service-policy.json;
        mc admin policy attach local neb-media-service
        --user "$$S3_ACCESS_KEY";
        mc ilm rule import "local/$$S3_BUCKET" < /config/lifecycle.json
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-change-me}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-neb-service}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-neb-service-local-change-me}
      S3_BUCKET: ${S3_BUCKET:-not-enough-bingo-local}
    volumes:
      - ./infra/minio/lifecycle.json:/config/lifecycle.json:ro
      - ./infra/minio/media-service-policy.json:/config/media-service-policy.json:ro
    networks:
      - app

  mailpit:
    image: axllent/mailpit:${MAILPIT_IMAGE_TAG:-v1.30.4}
    restart: unless-stopped
    environment:
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_MAX_MESSAGES: 500
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${BIND_ADDRESS:-127.0.0.1}:${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test:
        - CMD
        - /mailpit
        - readyz
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    stop_grace_period: 15s
    networks:
      - app

  proxy:
    image: nginx:${NGINX_IMAGE_TAG:-1.30.3-alpine}
    restart: unless-stopped
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-16m}
      NGINX_ENVSUBST_FILTER: NGINX_CLIENT_MAX_BODY_SIZE
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/templates:/etc/nginx/templates:ro
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8080}:8080"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --output-document=-
        - http://127.0.0.1:8080/healthz
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 15s
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  frontend_node_modules:
  frontend_next:
  postgres_data:
  redis_data:
  minio_data:
  mailpit_data:
