name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  foundation:
    name: Foundation configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose model
        run: |
          set -o pipefail
          docker compose --env-file .env.example config --quiet
          docker compose --env-file .env.example config --format json \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["services"]["minio-init"]["command"][0])' \
            | sh -n

      - name: Validate shell scripts
        run: |
          shellcheck infra/scripts/*.sh infra/minio/*.sh
          bash -n infra/scripts/*.sh infra/minio/*.sh

      - name: Validate infrastructure documents and Nginx syntax
        run: |
          python3 -m json.tool infra/minio/lifecycle.json >/dev/null
          python3 -m json.tool infra/minio/media-service-policy.json >/dev/null
          docker run --rm \
            --add-host frontend:127.0.0.1 \
            --add-host backend:127.0.0.1 \
            -e NGINX_CLIENT_MAX_BODY_SIZE=16m \
            -e NGINX_ENVSUBST_FILTER=NGINX_CLIENT_MAX_BODY_SIZE \
            -v "$PWD/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/infra/nginx/templates:/etc/nginx/templates:ro" \
            "nginx:$(awk -F= '/^NGINX_IMAGE_TAG=/{print $2}' .env.example)" \
            nginx -t

      - name: Validate Make targets
        run: make -n config backup-db

  backend:
    name: Backend quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: not_enough_bingo_test
          POSTGRES_USER: not_enough_bingo
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U not_enough_bingo -d not_enough_bingo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DEBUG: "false"
      DJANGO_SECRET_KEY: ci-test-only-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost
      CORS_ALLOWED_ORIGINS: http://localhost
      DATABASE_URL: postgresql://not_enough_bingo:test-only-password@127.0.0.1:5432/not_enough_bingo_test
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit==2.10.1

      - name: Audit production Python dependency graph
        run: pip-audit . --progress-spinner=off

      - name: Ruff lint and format
        run: |
          ruff check .
          ruff format --check .

      - name: Typecheck
        run: mypy .

      - name: Check migrations
        run: |
          python manage.py migrate --noinput
          python manage.py makemigrations --check --dry-run

      - name: Validate OpenAPI schema
        run: |
          python manage.py spectacular --validate --file /tmp/openapi.yaml
          diff -u openapi.yaml /tmp/openapi.yaml

      - name: Run backend tests
        run: pytest --cov=apps --cov=config --cov-report=term-missing

  frontend:
    name: Frontend quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_CSRF_COOKIE_NAME: neb_csrf
      API_BASE_URL: http://127.0.0.1:8000/api/v1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit production npm dependency graph
        run: npm audit --omit=dev --audit-level=high

      - name: Verify generated API types are current
        run: |
          npm run api:types
          git diff --exit-code -- lib/api/schema.d.ts

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run component and integration tests
        run: npm test

      - name: Build production frontend
        run: npm run build

  e2e:
    name: Browser smoke tests
    runs-on: ubuntu-latest
    needs:
      - frontend
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_CSRF_COOKIE_NAME: neb_csrf
      API_BASE_URL: http://127.0.0.1:8000/api/v1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  live-e2e:
    name: Full-stack product flows
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    timeout-minutes: 45
    env:
      CI: "true"
      E2E_LIVE: "1"
      PLAYWRIGHT_BASE_URL: http://localhost:8080
      MAILPIT_BASE_URL: http://localhost:8025
      NEXT_PUBLIC_CSRF_COOKIE_NAME: neb_csrf
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure local full-stack environment
        run: cp .env.example .env

      - name: Build development application images
        run: docker compose build backend frontend

      - name: Start stateful dependencies
        run: |
          docker compose up -d --wait --wait-timeout 180 postgres redis minio mailpit
          docker compose run --rm --no-deps minio-init

      - name: Apply migrations and start application services
        run: |
          docker compose run --rm --no-deps backend python manage.py migrate --noinput
          docker compose up -d --wait --wait-timeout 240 backend worker frontend proxy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies and Chromium
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run live Playwright product flows
        working-directory: frontend
        run: npm run test:e2e -- --project=live-chromium

      - name: Capture application logs on failure
        if: ${{ failure() }}
        run: docker compose logs --no-color --tail=500 frontend backend worker proxy mailpit minio

      - name: Upload live Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: live-playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop full-stack services
        if: ${{ always() }}
        run: docker compose down --volumes --remove-orphans

  container-images:
    name: Production image (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            build_args: ""
          - name: frontend
            context: frontend
            build_args: |
              NEXT_PUBLIC_APP_URL=http://localhost:8080
              NEXT_PUBLIC_API_BASE_URL=/api/v1
              NEXT_PUBLIC_CSRF_COOKIE_NAME=neb_csrf
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image without publishing
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          target: production
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          build-args: ${{ matrix.build_args }}
