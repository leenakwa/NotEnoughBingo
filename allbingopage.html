<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Bingo — Not Enough Bingo</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="styles.css" rel="stylesheet">
  <link href="card.css" rel="stylesheet">
  <link href="allbingo.css" rel="stylesheet">
</head>

<body>
<header class="header">
  <div class="header-left"><a class="title" href="main.html">Not-Enough-Bingo</a></div>
  <div class="header-center"><a class="btn" href="createbingo.html" aria-label="Create bingo"><i class="fa-regular fa-circle-plus"></i></a></div>
  <nav class="header-right" aria-label="Main navigation">
    <a href="foryoupage.html">For You</a>
    <a href="main.html">Popular</a>
    <a href="allbingopage.html" class="active">All Bingo</a>
    <a class="btn" href="profile.html" aria-label="Profile"><i class="fa-solid fa-house-user"></i></a>
  </nav>
</header>

<main class="all-bingo-page">
  <section class="search-panel" aria-label="Search bingo">
    <div class="filter-field tag-filter">
      <label for="tag-filter">Tags</label>
      <div class="input-with-icon tag-search-wrap"><i class="fa-solid fa-magnifying-glass"></i><input id="tag-filter" type="search" autocomplete="off" placeholder="Search tags" aria-controls="tag-suggestions"><div id="tag-suggestions" class="tag-suggestions is-hidden" role="listbox" aria-label="Tag suggestions"></div></div>
    </div>
    <div class="filter-field">
      <label for="author-filter">Author</label>
      <div class="input-with-icon"><i class="fa-solid fa-magnifying-glass"></i><input id="author-filter" type="search" placeholder="Search author"></div>
    </div>
    <div class="filter-field">
      <label for="title-filter">Search by name</label>
      <div class="input-with-icon"><i class="fa-solid fa-magnifying-glass"></i><input id="title-filter" type="search" placeholder="Enter a title"></div>
    </div>
    <div class="filter-field sort-field">
      <span class="filter-label">Sort</span>
      <div class="sort-options" role="radiogroup" aria-label="Sort bingos">
        <label class="sort-option"><input type="radio" name="sort" value="popular" checked><span><b>Popular</b><small>Most likes and comments</small></span></label>
        <label class="sort-option"><input type="radio" name="sort" value="new"><span><b>New</b><small>Recently created</small></span></label>
      </div>
    </div>
  </section>

  <p id="results-count" class="results-count" aria-live="polite"></p>
  <section id="cards-grid" class="cards-grid" aria-label="Bingo results"></section>
</main>

<script src="allbingo.js"></script>
</body>
</html>
