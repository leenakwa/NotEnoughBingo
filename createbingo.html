<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create bingo — Not Enough Bingo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="styles.css" rel="stylesheet">
    <link href="bingo.css" rel="stylesheet">
</head>

<body>
<header class="header">
    <div class="header-left"><a class="title" href="main.html">Not-Enough-Bingo</a></div>
    <div class="header-center"><a class="btn" href="createbingo.html" aria-label="Create bingo"><i class="fa-regular fa-circle-plus"></i></a></div>
    <nav class="header-right" aria-label="Main navigation">
        <a href="foryoupage.html">For You</a>
        <a href="main.html" class="active">Popular</a>
        <a href="allbingopage.html">All Bingo</a>
        <a class="btn" href="profile.html" aria-label="Profile"><i class="fa-solid fa-house-user"></i></a>
    </nav>
</header>

<main class="create-page">
    <section id="editor-step" class="editor-step" aria-labelledby="editor-heading">
        <h1 id="editor-heading" class="sr-only">Create bingo board</h1>
        <aside id="cell-panel" class="cell-panel" aria-live="polite">
            <div class="panel-heading"><span id="selection-label">Cell editor</span><button id="close-panel" class="icon-button" aria-label="Close cell editor">×</button></div>
            <label class="panel-label" for="cell-text">Text</label>
            <textarea id="cell-text" rows="4" maxlength="100" placeholder="Write something..."></textarea>
            <div class="format-row" aria-label="Text formatting">
                <button type="button" class="format-button" data-format="bold" title="Bold"><i class="fa-solid fa-bold"></i></button>
                <button type="button" class="format-button" data-format="italic" title="Italic"><i class="fa-solid fa-italic"></i></button>
                <button type="button" class="format-button" data-format="strike" title="Strikethrough"><i class="fa-solid fa-strikethrough"></i></button>
                <button type="button" class="format-button" data-format="underline" title="Underline"><i class="fa-solid fa-underline"></i></button>
            </div>
            <label class="panel-label" for="text-color">Text colour</label>
            <input id="text-color" class="color-input" type="color" value="#000000">
            <label class="panel-label" for="cell-color">Cell background</label>
            <input id="cell-color" class="color-input" type="color" value="#ffffff">
            <label class="range-label" for="cell-opacity">Background opacity <output id="cell-opacity-value">100%</output></label>
            <input id="cell-opacity" class="range-input" type="range" min="0" max="100" value="100">
            <label class="panel-label upload-label" for="cell-image"><i class="fa-regular fa-image"></i> Add image to cell</label>
            <input id="cell-image" type="file" accept="image/*" hidden>
            <label class="range-label" for="image-opacity">Image opacity <output id="image-opacity-value">100%</output></label>
            <input id="image-opacity" class="range-input" type="range" min="0" max="100" value="100">

            <div class="panel-divider"></div>
            <p class="panel-subheading">Borders</p>
            <label class="panel-label" for="border-color">Border colour</label>
            <input id="border-color" class="color-input" type="color" value="#000000">
            <label class="range-label" for="border-width">Border width <output id="border-width-value">1px</output></label>
            <input id="border-width" class="range-input" type="range" min="0" max="12" value="1">
            <label class="panel-label" for="border-style">Border style</label>
            <select id="border-style" class="panel-select">
                <option value="solid">Solid</option>
                <option value="dashed">Dashed</option>
                <option value="dotted">Dotted</option>
                <option value="double">Double</option>
            </select>
        </aside>

        <div class="bingo-container">
            <div class="bingo-top-row">
                <div class="bingo-background-control">
                    <button id="upload-bg-btn" class="bingo-action-btn"><i class="fa-regular fa-image"></i> Upload Background</button>
                    <input type="file" id="background-upload" accept="image/*" hidden>
                </div>
                <div class="bingo-size-control" aria-label="Bingo size">
                    <button id="minus-size" class="bingo-size-btn" aria-label="Decrease bingo size">−</button>
                    <span id="bingo-size-count">5 × 5</span>
                    <button id="plus-size" class="bingo-size-btn" aria-label="Increase bingo size">+</button>
                </div>
            </div>
            <p class="editor-hint">Click a cell to edit it, or drag across cells to edit several at once. Click outside to deselect.</p>
            <section id="bingo-board" class="bingo-board" aria-label="Bingo board"></section>
            <button id="finish-creating" class="primary-action">Finish creating <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </section>

    <section id="details-step" class="details-step is-hidden" aria-labelledby="details-heading">
        <div class="details-card">
            <button id="back-to-editor" class="back-button"><i class="fa-solid fa-arrow-left"></i> Back to bingo</button>
            <h1 id="details-heading">Almost there</h1>
            <p class="step-description">Give your bingo a name and help people find it.</p>
            <label for="bingo-title">Title</label>
            <input id="bingo-title" class="details-input" type="text" maxlength="70" placeholder="Enter the title">
            <label for="tag-search">Tags <span class="field-note">up to 15</span></label>
            <div id="selected-tags" class="selected-tags"></div>
            <div class="tag-search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i><input id="tag-search" class="details-input" autocomplete="off" placeholder="Search or add a tag">
                <div id="tag-suggestions" class="tag-suggestions is-hidden"></div>
            </div>
            <label for="cover-upload">Cover image <span class="field-note">optional</span></label>
            <div class="cover-control">
                <div id="cover-preview" class="cover-preview"><i class="fa-regular fa-image"></i><span>No cover selected</span></div>
                <label class="secondary-action" for="cover-upload"><i class="fa-solid fa-arrow-up-from-bracket"></i> Choose file</label>
                <input id="cover-upload" type="file" accept="image/*" hidden>
            </div>
            <div class="details-actions">
                <button id="create-bingo" class="primary-action">Create bingo</button>
                <button id="save-draft" class="secondary-action">Save to drafts</button>
                <div class="download-wrap"><button id="download-button" class="secondary-action">Download <i class="fa-solid fa-chevron-down"></i></button><div id="download-menu" class="download-menu is-hidden"><button data-format="png">PNG</button><button data-format="pdf">PDF</button></div></div>
            </div>
            <p id="form-message" class="form-message" role="status"></p>
        </div>
    </section>
</main>

<script src="createbingo.js"></script>
</body>
</html>
